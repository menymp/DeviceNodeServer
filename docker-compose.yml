      - "${VIDEO_SEED_PORT}:${VIDEO_SEED_PORT}"
      - "${DEVICE_SOCKET_PORT}:${DEVICE_SOCKET_PORT}"
    depends_on:
      nodes-db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started

  websocket-service:
    build:
      context: .
      dockerfile: ./deviceNodeServer/DeviceMainNodeServer/WSocketServerManager/Dockerfile
    restart: always
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT}
      DEVICE_MANAGER_LOCAL_CONN: ${DEVICE_MANAGER_LOCAL_CONN}
    volumes:
      - ./deviceNodeServer/DeviceMainNodeServer/config.ini:/app/config.ini:ro # <---- outdated way
    secrets:
      - db_user_password
    ports:
      - "${WEBSOCKET_PORT}:${WEBSOCKET_PORT}"
    depends_on:
      - device-manager-service

  php-node-service:
    build:
       context: ./phpWebApp
       dockerfile: Dockerfile
    restart: always
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
    volumes:
      - ./phpconfig/php.ini:/var/www/html/config.ini:ro
    secrets:
      - db_user_password
    ports:
      - "${PHP_PORT}:80"
    depends_on:
      nodes-db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
          

