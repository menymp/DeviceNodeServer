volumes:
  registry_data:
  db_data:
  caddy_data:
  caddy_config:

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_user_password:
    file: ./secrets/db_user_password.txt
  jwt_private_key:
    file: ./secrets/jwt_private_key.pem
  jwt_public_key: 
    file: ./secrets/jwt_public_key.pem
