
services:
  device-manager-service:
    build:
      context: .
      dockerfile: ./deviceNodeServer/DeviceMainNodeServer/DeviceManager/Dockerfile
    restart: always
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      DEVICE_MANAGER_SERVER_PATH: ${DEVICE_MANAGER_SERVER_PATH}
      ADD_DEVICES_TIME_POLL: ${ADD_DEVICES_TIME_POLL}
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT} #ToDo: rewire the broker host and port into device manager as well, given the server centralization
      MQTT_CLIENT_KEEPALIVE: ${MQTT_CLIENT_KEEPALIVE}
      DEVICE_MAIN_LOCAL_CONN: ${DEVICE_MAIN_LOCAL_CONN} # for the source of trut REP server
    volumes:
      - ./deviceNodeServer/DeviceMainNodeServer/config.ini:/app/config.ini:ro # <---- outdated way
    secrets:
      - db_user_password
    depends_on:
      nodes-db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started

  node-device-manager-service:
    build:
      context: .
      dockerfile: ./deviceNodeServer/DeviceMainNodeServer/NodeDeviceManager/Dockerfile
    restart: always
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      SEARCH_DEVICES_PERIOD: ${SEARCH_DEVICES_PERIOD}
      DEVICE_MAIN_SERVER_PATH: ${DEVICE_MAIN_SERVER_PATH}
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT} #ToDo: rewire the broker host and port into device manager as well, given the server centralization
      MQTT_CLIENT_KEEPALIVE: ${MQTT_CLIENT_KEEPALIVE}
    volumes:
      - ./deviceNodeServer/DeviceMainNodeServer/config.ini:/app/config.ini:ro # <---- outdated way
    secrets:
      - db_user_password
    depends_on:
      nodes-db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started

  video-composer-service:
    build:
      context: .
      dockerfile: ./deviceNodeServer/DeviceMainNodeServer/VideoHandler_v2/Dockerfile
    restart: always
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      VIDEO_HANDLER_SERVER_PATH: ${VIDEO_HANDLER_SERVER_PATH}
      VIDEO_SEED_PORT: ${VIDEO_SEED_PORT}
      DEVICE_SOCKET_PORT: ${DEVICE_SOCKET_PORT}
    volumes:
      - ./deviceNodeServer/DeviceMainNodeServer/config.ini:/app/config.ini:ro # <---- outdated way
    secrets:
      - db_user_password
    ports:
    #  - "${VIDEO_SEED_PORT}:${VIDEO_SEED_PORT}"
      - "${DEVICE_SOCKET_PORT}:${DEVICE_SOCKET_PORT}"
    depends_on:
      nodes-db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started

  websocket-service:
    build:
      context: .
      dockerfile: ./deviceNodeServer/DeviceMainNodeServer/WSocketServerManager/Dockerfile
    restart: always
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT}
      DEVICE_MANAGER_LOCAL_CONN: ${DEVICE_MANAGER_LOCAL_CONN}
      AUTH_SERVICE_URL: "http://php-node-service:80"
      AUTH_VALIDATE_PATH: "/api/users/me"
    volumes:
      - ./deviceNodeServer/DeviceMainNodeServer/config.ini:/app/config.ini:ro # <---- outdated way
    secrets:
      - db_user_password
    #ports:
    #  - "${WEBSOCKET_PORT}:${WEBSOCKET_PORT}"
    depends_on:
      - device-manager-service
      - php-node-service

  php-node-service:
    build:
      context: ./phpWebApp
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_ENV: production
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      DB_PORT: 3306
      JWT_PRIVATE_KEY_PATH: /var/www/html/secrets/jwt_private_key
      JWT_PUBLIC_KEY_PATH: /var/www/html/secrets/jwt_public_key
      # IMPORTANT: set to the Caddy origin (use https://your.domain)
      CORS_ORIGIN: ${CADDY_ORIGIN}
    secrets:
      - db_user_password
      - jwt_private_key
      - jwt_public_key
    volumes:
      - ./phpconfig/php.ini:/var/www/html/config.ini:ro
    depends_on:
      nodes-db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    # Optional: remove host port exposure when using Caddy as proxy
    # ports:
    #   - "${PHP_PORT}:80"
    
  caddy:
    image: caddy:2
    ports: ["80:80","443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      WEBSOCKET_PORT: "${WEBSOCKET_PORT}"   # pass compose env into caddy container
      VIDEO_SEED_PORT: "${VIDEO_SEED_PORT}"
      REACT_MANAGER_PORT: "${REACT_MANAGER_PORT}"
    depends_on:
      - php-node-service
      - websocket-service
      - video-composer-service
      - react-device-manager-ui

  react-device-manager-ui:
    build:
      context: ./nodePackages/device-mgr-ui/
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      # point to the public Caddy origin (frontend will use this)
      REACT_APP_BASE_ORIGIN: ${CADDY_ORIGIN}
      REACT_APP_COMMAND_WEBSOCKET_URL: ws://${CADDY_HOST}/workHandler
      REACT_APP_DEVICE_SERVICE_URL: https://${CADDY_HOST}/api
      REACT_APP_VIDEO_SEED_URL: http://${CADDY_HOST}:${VIDEO_SEED_PORT}/video_feed?vidArgs=
    #ports:
    #  - "${REACT_MANAGER_PORT}:${REACT_MANAGER_PORT}"
    volumes:
      - ./config/config.ini:/app/config.ini:ro
    depends_on:
      - websocket-service
      - php-node-service

  registry:
    image: registry:2
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
  
  generic-builder:
    image: gcr.io/kaniko-project/executor:latest
    command:
      - "--context=/workspace"
      - "--dockerfile=/workspace/Dockerfile"
      - "--destination=registry:5000/local/docker_base_image:dev"
      - "--insecure"            # allow HTTP registry (use only for internal/VPN)
      - "--insecure-registry=registry:5000"
    volumes:
      - ./docker_base_image:/workspace:ro
    depends_on:
      - registry

  reactor-service:
    container_name: nodes_reactor_service
    build:
      context: .
      dockerfile: ./deviceNodeServer/DeviceMainNodeServer/event_reactor/Dockerfile
    restart: always
    environment:
      # Database
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      # MQTT
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT}
      MQTT_CLIENT_KEEPALIVE: ${MQTT_CLIENT_KEEPALIVE}
      # Local integration endpoints (optional)
      WEBSOCKET_PORT: ${WEBSOCKET_PORT}
      DEVICE_MANAGER_LOCAL_CONN: ${DEVICE_MANAGER_LOCAL_CONN}
      VIDEO_HANDLER_LOCAL_CONN: ${VIDEO_HANDLER_LOCAL_CONN}
      # Reactor runtime options
      REACTOR_LOG_LEVEL: ${REACTOR_LOG_LEVEL:-INFO}
      REACTOR_REPO_ROOT: /app/event_reactor/handlers/
      REACTOR_HANDLER_PATH: /app/handlers
      REACTOR_NETWORK: ${REACTOR_NETWORK:-${COMPOSE_PROJECT_NAME}_default}
      REACTOR_CONTAINER_NAME: nodes_reactor_service
      REACTOR_WAIT_IMAGES: local/docker_base_image:dev
    volumes:
      - ./:/host_repo:ro
      - ./deviceNodeServer/DeviceMainNodeServer/event_reactor:/app/event_reactor:rw  # mount source for live edits
      - ./deviceNodeServer/DeviceMainNodeServer/ConfigsUtils:/app/ConfigsUtils:rw
      - ./deviceNodeServer/DeviceMainNodeServer/DButils:/app/DButils:rw
      - ./deviceNodeServer/DeviceMainNodeServer/DockerUtils:/app/DockerUtils:rw
      - ./reactor/handlers:/app/handlers:ro
      - ./reactor/config.ini:/app/config.ini:ro
      - /var/run/docker.sock:/var/run/docker.sock   # << required: allow reactor to create containers
      - ~/.cache/pip:/root/.cache/pip:rw                  # optional: speed pip installs in container
    secrets:
      - db_user_password
    depends_on:
      - registry
      - node-device-manager-service
      - device-manager-service
      - video-composer-service
      - websocket-service

  php-ota-service:
    build:
      context: ./phpMpyOta
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./config/config.ini:/var/www/html/config.ini:ro
    ports:
      - "${PHP_OTA_PORT}:80"

  nodes-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/db_user_password
    healthcheck: 
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DB_USER} --password=$(cat /run/secrets/db_user_password) || exit 1"]
      interval: 10s 
      timeout: 5s 
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/nodeServerModel.sql:/docker-entrypoint-initdb.d/nodeServerModel.sql:ro
      - ./sql/nodeServerSeeds.sql:/docker-entrypoint-initdb.d/nodeServerSeeds.sql:ro
    secrets:
      - db_root_password
      - db_user_password
    ports:
      - "${DB_NODE_PORT}:${DB_NODE_PORT}"

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    restart: always
    ports:
      - "${MQTT_BROKER_PORT}:${MQTT_BROKER_PORT}"
      - "9001:9001"
    volumes:
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf

  maintenance-service:
    build:
      context: .
      dockerfile: ./deviceNodeServer/DeviceMainNodeServer/MaintenanceService/Dockerfile
    restart: always
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
    volumes:
      - ./deviceNodeServer/DeviceMainNodeServer/config.ini:/app/config.ini:ro # <---- outdated way
    secrets:
      - db_user_password
    depends_on:
      nodes-db:
         condition: service_healthy

  xbee-bridge-service:
    build:
      context: .
      dockerfile: ./deviceNodeServer/xbeeNetwork/xbeeCoordinator/Dockerfile
    restart: always
    privileged: true # Grants the container the necessary permissions
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      XBEE_COORDINATOR_NAME: ${XBEE_COORDINATOR_NAME}
      XBEE_COORDINATOR_MANIFEST_PUBLISH_DELAY: ${XBEE_COORDINATOR_MANIFEST_PUBLISH_DELAY}
      XBEE_COORDINATOR_TTY_PORT: ${XBEE_COORDINATOR_TTY_PORT}
      XBEE_COORDINATOR_BAUDRATE: ${XBEE_COORDINATOR_BAUDRATE}
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT}
    secrets:
      - db_user_password
    devices:
      # Map the host's serial device to a name inside the container
      - "${XBEE_COORDINATOR_TTY_PORT}:${XBEE_COORDINATOR_TTY_PORT}"
    volumes:
      - ./deviceNodeServer/xbeeNetwork/xbeeCoordinator:/app/xbeeCoordinator:rw  # mount source for live edits
      - ./deviceNodeServer/Libraries:/app/Libraries:rw
      - ./deviceNodeServer/DeviceMainNodeServer/ConfigsUtils:/app/ConfigsUtils:rw
      - ./deviceNodeServer/DeviceMainNodeServer/DButils:/app/DButils:rw
      - ./deviceNodeServer/DeviceMainNodeServer/DockerUtils:/app/DockerUtils:rw
    depends_on:
      mqtt-broker:
        condition: service_started
      nodes-db:
         condition: service_healthy
      node-device-manager-service:
        condition: service_started

  telegram-executor-service:
    build:
      context: .
      dockerfile: ./deviceNodeServer/DeviceMainNodeServer/TelegramCommandExecutor/Dockerfile
    restart: always
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT}
      DEVICE_MANAGER_LOCAL_CONN: ${DEVICE_MANAGER_LOCAL_CONN}
      VIDEO_HANDLER_LOCAL_CONN: ${VIDEO_HANDLER_LOCAL_CONN}
      VIDEO_API_BASE_URL: http://video-composer-service:${VIDEO_SEED_PORT}
    volumes:
      - ./deviceNodeServer/DeviceMainNodeServer/config.ini:/app/config.ini:ro # <---- outdated way
    secrets:
      - db_user_password
    depends_on:
      - device-manager-service
      - video-composer-service

  scheduler-service:
    build:
      context: .
      dockerfile: ./deviceNodeServer/DeviceMainNodeServer/SchedulerService/Dockerfile
    restart: always
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      SCHEDULER_DB_POLL_S: "30"
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT} #ToDo: rewire the broker host and port into device manager as well, given the server centralization
      MQTT_CLIENT_KEEPALIVE: ${MQTT_CLIENT_KEEPALIVE}
    secrets:
      - db_user_password
    depends_on:
      nodes-db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started

