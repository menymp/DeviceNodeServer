
services:
  registry:
    image: registry:2
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
  
  generic-builder:
    build:
      context: ./docker_base_image
      dockerfile: Dockerfile
    image: registry:5000/local/docker_base_image:dev
    command: >
      /bin/sh -c "
        set -e;
        docker build -t registry:5000/local/docker_base_image:dev . || exit 1;
        docker push registry:5000/local/docker_base_image:dev || exit 1;
        echo BUILT > /tmp/built;
        sleep 1
      "
    # The builder needs access to the host docker daemon to build and push
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - registry
  
