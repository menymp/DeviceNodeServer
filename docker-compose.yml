  video-composer-service:
    build:
      context: .
      dockerfile: ./deviceNodeServer/DeviceMainNodeServer/VideoHandler_v2/Dockerfile
    restart: always
    environment:
      DB_HOST: nodes-db
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_user_password
      DB_NAME: ${DB_NAME}
      VIDEO_HANDLER_SERVER_PATH: ${VIDEO_HANDLER_SERVER_PATH}
      VIDEO_SEED_PORT: ${VIDEO_SEED_PORT}
      DEVICE_SOCKET_PORT: ${DEVICE_SOCKET_PORT}
    volumes:
      - ./deviceNodeServer/DeviceMainNodeServer/config.ini:/app/config.ini:ro # <---- outdated way
